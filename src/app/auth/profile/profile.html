<div *ngIf="!formReady">Loading...</div>

<div *ngIf="formReady" class="profile-card">
  <h2>Profile</h2>

  <form [formGroup]="form" (ngSubmit)="save()">
    <div>
      <label>Full name</label>
      <input formControlName="fullName" />
    </div>

    <div>
      <label>Email</label>
      <input formControlName="email" disabled />
    </div>

    <div>
      <label>Phone</label>
      <input formControlName="phoneNumber" />
    </div>

    <button type="submit">Save</button>
  </form>
</div>
